<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Arcade — Pocket Lab</title>
<style>
  /* ============================================================
     Agent Arcade · Variant 03 — Pocket Lab
     A yellow handheld with a 1-bit memory-LCD screen. No colour
     inside the glass — status is encoded as dither (solid / hatch /
     dots), the way a 1-bit console has to. A crank on the side
     advances the fleet. Toy on the outside, console on the inside.
     System type only — no network, no fonts, no deps.
     ============================================================ */

  :root {
    --yellow:   #ffd21a;   /* console body */
    --yellow-2: #f5c200;   /* recessed bezel */
    --yellow-3: #e0af00;   /* shadow line */
    --case-ink: #2a2200;

    --screen:   #e9e8db;   /* paper-white memory LCD */
    --ink:      #18160d;   /* the only "colour" on screen */
    --ink-soft: #4a4738;

    --sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--case-ink);
    background:
      radial-gradient(140% 120% at 80% -10%, #ffe05a 0%, transparent 50%),
      var(--yellow);
    padding: clamp(.75rem, 3vw, 2.5rem);
    -webkit-font-smoothing: antialiased;
    display: grid; place-items: center; min-height: 100vh;
  }

  /* ---------- the console body ---------- */
  .console {
    position: relative;
    width: min(940px, 100%);
    background: linear-gradient(180deg, var(--yellow) 0%, var(--yellow-2) 100%);
    border-radius: 26px;
    border: 2px solid var(--yellow-3);
    box-shadow:
      0 2px 0 rgba(255,255,255,.4) inset,
      0 -6px 16px rgba(0,0,0,.06) inset,
      0 26px 50px -26px rgba(120,90,0,.6);
    padding: clamp(1rem, 2.4vw, 1.8rem);
    padding-right: clamp(1rem, 2.4vw, 1.8rem);
    display: grid;
    grid-template-columns: 1fr 56px;
    gap: clamp(.8rem, 2vw, 1.4rem);
  }

  .brand-row {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: 0 .4rem .2rem;
  }
  .brand { display: flex; align-items: center; gap: .6rem; }
  .brand .glyph {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--case-ink); color: var(--yellow);
    display: grid; place-items: center; font-weight: 900; font-size: .9rem;
    transform: rotate(-8deg);
  }
  .brand b { font-size: 1.02rem; font-weight: 800; letter-spacing: -.01em; }
  .speaker { display: flex; gap: 4px; }
  .speaker i { width: 5px; height: 5px; border-radius: 50%; background: var(--yellow-3); }

  /* ---------- the screen (1-bit) ---------- */
  .screen {
    background: var(--screen);
    color: var(--ink);
    border: 3px solid var(--case-ink);
    border-radius: 8px;
    box-shadow: 0 3px 0 rgba(0,0,0,.25), 0 0 0 6px var(--yellow-2);
    padding: 14px;
    /* faint LCD scanline texture */
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,.025) 0 1px, transparent 1px 3px);
    background-color: var(--screen);
    overflow: hidden;
  }

  /* status bar */
  .statusbar {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--ink); padding-bottom: 7px; margin-bottom: 10px;
    font-family: var(--mono); font-size: .66rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
  }
  .statusbar .right { display: flex; align-items: center; gap: 10px; }
  .bat { display: inline-flex; align-items: center; gap: 2px; }
  .bat .cell { width: 16px; height: 8px; border: 1.5px solid var(--ink); border-radius: 1px; position: relative; }
  .bat .cell::before { content:""; position:absolute; inset:1.5px; right: 5px; background: var(--ink); }
  .bat .cell::after { content:""; position:absolute; right:-3px; top:2px; width:2px; height:4px; background: var(--ink); }
  .wifi { display:inline-flex; align-items:flex-end; gap:2px; }
  .wifi i { width:3px; background: var(--ink); }
  .wifi i:nth-child(1){height:4px}.wifi i:nth-child(2){height:7px}.wifi i:nth-child(3){height:10px}

  /* title */
  .title-block { display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; margin-bottom: 12px; }
  .title-block h1 {
    margin: 0; font-size: clamp(1.5rem, 4.4vw, 2.3rem); line-height: .9;
    font-weight: 900; letter-spacing: -.03em; text-transform: uppercase;
  }
  .title-block h1 span { display:block; font-size:.42em; letter-spacing:.04em; -webkit-text-stroke: 0; }
  .season {
    font-family: var(--mono); font-size: .6rem; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    border: 2px solid var(--ink); border-radius: 4px; padding: .2rem .45rem; white-space: nowrap;
  }

  /* system tiles */
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
  .tile { border: 2px solid var(--ink); border-radius: 5px; padding: 7px 8px; position: relative; overflow: hidden; }
  .tile .k { font-family: var(--mono); font-size: .54rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); }
  .tile .v { font-size: 1.05rem; font-weight: 900; letter-spacing: -.02em; margin-top: 2px; }
  .tile .v small { font-size: .6rem; font-weight: 700; }
  .tile.alert { color: var(--screen); background: var(--ink); }
  .tile.alert .k { color: color-mix(in oklab, var(--screen) 75%, var(--ink)); }

  /* section header */
  .menu-head {
    display:flex; align-items:center; justify-content:space-between;
    font-family: var(--mono); font-size: .6rem; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft);
    margin: 2px 2px 6px;
  }

  /* fleet menu (1-bit selectable list) */
  .menu { display: flex; flex-direction: column; gap: 4px; }
  .item {
    display: grid; grid-template-columns: 16px 1fr auto; align-items: center; gap: 8px;
    padding: 7px 9px; border-radius: 5px; cursor: pointer;
    border: 2px solid transparent;
  }
  .item .cursor { font-weight: 900; opacity: 0; }
  .item .name { font-weight: 800; font-size: .96rem; letter-spacing: -.01em; }
  .item .role { font-family: var(--mono); font-size: .62rem; color: var(--ink-soft); }
  .item.sel { background: var(--ink); color: var(--screen); border-color: var(--ink); }
  .item.sel .cursor { opacity: 1; }
  .item.sel .role { color: color-mix(in oklab, var(--screen) 70%, var(--ink)); }

  /* 1-bit status badge: state encoded as fill pattern, not colour */
  .badge {
    font-family: var(--mono); font-size: .56rem; font-weight: 800;
    letter-spacing: .08em; text-transform: uppercase;
    border: 2px solid currentColor; border-radius: 4px;
    padding: .12rem .4rem; display: inline-flex; align-items: center; gap: 5px;
  }
  .swz { width: 12px; height: 12px; border: 1.5px solid currentColor; border-radius: 2px; }
  /* READY = solid fill */
  .swz.solid { background: currentColor; }
  /* BUSY = diagonal hatch + implies motion */
  .swz.hatch {
    background-image: repeating-linear-gradient(45deg, currentColor 0 1.5px, transparent 1.5px 3.5px);
  }

  /* detail strip — shows selected agent's signal */
  .detail {
    margin-top: 12px; border-top: 2px dashed var(--ink); padding-top: 9px;
    display: flex; align-items: center; gap: 8px;
    font-size: .82rem; font-weight: 600;
  }
  .detail .tag { font-family: var(--mono); font-size: .58rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; border:2px solid var(--ink); border-radius:4px; padding:.1rem .35rem; }
  .blink { animation: bl 1s steps(1) infinite; }
  @keyframes bl { 50% { opacity: 0; } }

  /* background jobs (cron) */
  .jobs { margin-top: 12px; }
  .job {
    display: grid; grid-template-columns: 1fr auto; gap: 6px 10px;
    align-items: baseline; padding: 5px 4px; border-bottom: 1px dotted var(--ink-soft);
  }
  .job:last-child { border-bottom: none; }
  .job .jn { font-weight: 700; font-size: .82rem; letter-spacing: -.01em; }
  .job .jc { font-family: var(--mono); font-size: .66rem; color: var(--ink-soft); }
  .job .jx { font-family: var(--mono); font-size: .66rem; }

  /* ---------- the crank ---------- */
  .crank-col { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .crank-rail { position:absolute; top: 64px; bottom: 64px; width: 6px; border-radius: 3px; background: var(--yellow-3); box-shadow: 0 1px 0 rgba(255,255,255,.4); }
  .crank {
    position: relative; width: 40px; height: 132px;
    display: flex; flex-direction: column; align-items: center;
    animation: spin 7s linear infinite;
    transform-origin: 50% 30px;
  }
  .crank:hover { animation-duration: 1.4s; }
  .crank .pivot { width: 14px; height: 14px; border-radius: 50%; background: var(--case-ink); margin-top: 24px; box-shadow: 0 0 0 4px var(--yellow-2); }
  .crank .arm { width: 6px; height: 64px; background: var(--case-ink); border-radius: 3px; margin-top: -2px; }
  .crank .grip { width: 16px; height: 26px; border-radius: 6px; background: var(--case-ink); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .crank-hint {
    margin-top: 10px; font-family: var(--mono); font-size: .54rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--yellow-3);
    writing-mode: vertical-rl; transform: rotate(180deg);
    position: absolute; bottom: 6px;
  }

  @media (max-width: 760px) {
    .console { grid-template-columns: 1fr; }
    .crank-col { display: none; }
    .tiles { grid-template-columns: repeat(2, 1fr); }
  }
  @media (prefers-reduced-motion: reduce) {
    .crank { animation: none; }
    .blink { animation: none; }
  }
</style>
</head>
<body>
  <main class="console">
    <div class="brand-row">
      <div class="brand"><span class="glyph">A</span><b>Agent Arcade</b><span style="font-family:var(--mono);font-size:.6rem;color:var(--yellow-3);font-weight:700;letter-spacing:.1em">POCKET LAB</span></div>
      <div class="speaker" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </div>

    <section class="screen" id="screen" tabindex="0" aria-label="1-bit console screen">
      <div class="statusbar">
        <span id="loc">LOCAL · HERMES</span>
        <span class="right">
          <span class="wifi" aria-hidden="true"><i></i><i></i><i></i></span>
          <span class="bat" aria-hidden="true"><span class="cell"></span></span>
          <span id="clock">15:01</span>
        </span>
      </div>

      <div class="title-block">
        <h1>Agent<span>Arcade</span></h1>
        <span class="season">Season 01</span>
      </div>

      <div class="tiles" id="tiles"></div>

      <div class="menu-head"><span>Fleet — choose a cabinet</span><span id="menu-count"></span></div>
      <div class="menu" id="menu"></div>

      <div class="detail" id="detail"></div>

      <div class="jobs">
        <div class="menu-head" style="margin-top:12px"><span>Background jobs</span><span id="jobs-count"></span></div>
        <div id="jobs"></div>
      </div>
    </section>

    <div class="crank-col" aria-hidden="true">
      <div class="crank-rail"></div>
      <div class="crank"><div class="pivot"></div><div class="arm"></div><div class="grip"></div></div>
      <span class="crank-hint">Crank to scroll</span>
    </div>
  </main>

<script>
const FALLBACK = {
  generated_at:"2026-06-21T15:01:44-04:00",
  hermes:{ version:{version:"0.17.0"}, gateway:{pid:76095}, cron:{active_jobs:10, next:"18:00"} },
  repo:{branch:"main", head:"7ab318b", changed_files:8},
  agents:[
    {label:"Rogue", role:"Control plane · command-deck", status:"ready", signal:"All systems stable."},
    {label:"Codex", role:"Primary builder · builder-bay", status:"ready", signal:"All systems stable."},
    {label:"Claude Code", role:"Deep reviewer · review-rail", status:"ready", signal:"All systems stable."},
    {label:"Scout", role:"Repo ranger · branch-radar", status:"active", signal:"8 files changed in this repo."},
    {label:"Sentinel", role:"Gateway watcher · pulse-tower", status:"ready", signal:"All systems stable."},
    {label:"Ticker", role:"Scheduler monitor · clockwork", status:"ready", signal:"All systems stable."},
    {label:"Patchbay", role:"Local automation · wire-mesh", status:"active", signal:"10 cron job definitions detected."},
    {label:"Archivist", role:"Snapshot keeper · memory-vault", status:"active", signal:"Writing replayable snapshots to data/runs/."}
  ],
  cron:[
    {name:"morning-operating-brief", schedule:"0 8 * * 1-5", next:"Mon 08:00"},
    {name:"weekly-rogue-fiction-draft", schedule:"0 20 * * 0", next:"20:00"},
    {name:"rogue-watchdog-health-monitor", schedule:"0 */6 * * *", next:"18:00"},
    {name:"family-weekend-weather-and-outing-brief", schedule:"30 8 * * 5", next:"Fri 08:30"},
    {name:"rogue-pregnancy-weekly", schedule:"0 19 * * 0", next:"19:00"},
    {name:"rogue-knowledge-curated-sync", schedule:"20 21 * * *", next:"21:20"},
    {name:"rogue-pr-babysitter-loop", schedule:"0 8-18 * * 1-5", next:"Mon 08:00"},
    {name:"rogue-personal-site-loop", schedule:"0 */6 * * *", next:"18:00"},
    {name:"rogue-knowledge-hygiene-loop", schedule:"30 21 * * *", next:"21:30"},
    {name:"rogue-disk-hygiene-watchdog", schedule:"0 */6 * * *", next:"18:00"}
  ]
};

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let DATA = FALLBACK, sel = 0;

function renderTiles(d){
  const h = d.hermes;
  const t = [
    ["VER", `v${h.version.version}`, false],
    ["GATE", "ON", false],
    ["CRON", `${h.cron.active_jobs}<small> jobs</small>`, false],
    ["GIT", `${d.repo.changed_files}<small> Δ</small>`, true]
  ];
  document.getElementById("tiles").innerHTML = t.map(([k,v,a]) =>
    `<div class="tile${a?" alert":""}"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
}

function renderMenu(d){
  document.getElementById("menu-count").textContent = `${d.agents.length} units`;
  document.getElementById("menu").innerHTML = d.agents.map((a,i) => {
    const ready = a.status === "ready";
    const badge = ready
      ? `<span class="badge"><span class="swz solid"></span>Ready</span>`
      : `<span class="badge"><span class="swz hatch"></span>Busy</span>`;
    return `
      <div class="item${i===sel?" sel":""}" data-i="${i}">
        <span class="cursor">►</span>
        <span><span class="name">${esc(a.label)}</span><br><span class="role">${esc(a.role)}</span></span>
        ${badge}
      </div>`;
  }).join("");
  renderDetail(d);
}

function renderDetail(d){
  const a = d.agents[sel];
  const tag = a.status === "ready" ? "OK" : "BUSY";
  document.getElementById("detail").innerHTML =
    `<span class="tag">${tag}</span><span>${esc(a.label)} — ${esc(a.signal)}</span><span class="blink" aria-hidden="true">▍</span>`;
}

function renderJobs(d){
  document.getElementById("jobs-count").textContent = `${d.cron.length} routines`;
  document.getElementById("jobs").innerHTML = d.cron.map(c => `
    <div class="job">
      <span class="jn">${esc(c.name)}</span>
      <span class="jx">▸ ${esc(c.next)}</span>
      <span class="jc">${esc(c.schedule)}</span>
    </div>`).join("");
}

function moveSel(delta){
  const n = DATA.agents.length;
  sel = (sel + delta + n) % n;
  renderMenu(DATA);
  const el = document.querySelector(".item.sel");
  if (el) el.scrollIntoView({block:"nearest"});
}

function boot(d){ DATA = d; if (sel >= d.agents.length) sel = 0; renderTiles(d); renderMenu(d); renderJobs(d); }
boot(FALLBACK);

const screen = document.getElementById("screen");
document.addEventListener("keydown", e => {
  if (e.key === "ArrowDown"){ e.preventDefault(); moveSel(1); }
  else if (e.key === "ArrowUp"){ e.preventDefault(); moveSel(-1); }
});
document.getElementById("menu").addEventListener("click", e => {
  const it = e.target.closest(".item"); if (it){ sel = +it.dataset.i; renderMenu(DATA); }
});
// the crank: wheel over the screen advances the fleet
let acc = 0;
screen.addEventListener("wheel", e => {
  acc += e.deltaY;
  if (Math.abs(acc) > 40){ moveSel(acc > 0 ? 1 : -1); acc = 0; e.preventDefault(); }
}, {passive:false});

if (location.protocol.startsWith("http")) {
  fetch("../data/latest.json").then(r=>r.ok?r.json():null).then(j=>{
    if(!j) return;
    const d = {
      generated_at:j.generated_at,
      hermes:{ version:j.hermes.version, gateway:j.hermes.gateway, cron:{active_jobs:j.hermes.cron.active_jobs, next:(j.hermes.cron.next_run||"").slice(11,16)} },
      repo:j.repo,
      agents:j.agents.map(a=>({label:a.label, role:`${a.role} · ${a.cabinet}`, status:a.status, signal:a.signal})),
      cron:j.hermes.cron_list.entries.map(c=>({name:c.name, schedule:c.schedule, next:(c.next_run||"").slice(5,16).replace("T"," ")}))
    };
    document.getElementById("clock").textContent = j.generated_at.slice(11,16);
    document.getElementById("loc").textContent = "LOCAL · LIVE";
    boot(d);
  }).catch(()=>{});
}
</script>
</body>
</html>
