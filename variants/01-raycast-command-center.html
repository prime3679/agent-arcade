<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Arcade — Command Center</title>
<style>
  /* ============================================================
     Agent Arcade · Variant 01 — Command Center
     A keyboard-first control surface in the spirit of a command
     palette: one column, everything searchable, nothing decorative.
     Neutral graphite chrome, a single coral accent reserved for the
     active line. System type only — no network, no fonts, no deps.
     ============================================================ */

  :root {
    --bg:        #0c0c0e;
    --panel:     #1a1a1d;
    --panel-2:   #202024;
    --raised:    #2a2a2f;
    --sel:       rgba(255,255,255,.055);
    --hair:      rgba(255,255,255,.07);
    --hair-2:    rgba(255,255,255,.11);

    --text:      #f3f3f4;
    --dim:       #9c9ca3;
    --faint:     #66666e;

    --coral:     #ff6b5e;
    --coral-dim: #ff8a80;
    --ok:        #56d189;
    --busy:      #f0b341;

    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;

    --r: 14px;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(120% 90% at 50% -20%, #1a1a22 0%, transparent 55%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    padding: clamp(.75rem, 3vw, 2.5rem);
    min-height: 100%;
  }

  /* ---------- The window ---------- */
  .palette {
    width: min(720px, 100%);
    background: var(--panel);
    border: 1px solid var(--hair-2);
    border-radius: var(--r);
    box-shadow:
      0 0 0 1px rgba(0,0,0,.4),
      0 30px 80px -20px rgba(0,0,0,.7),
      0 8px 24px -12px rgba(0,0,0,.6);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: min(880px, 92vh);
  }

  /* ---------- Search bar ---------- */
  .bar {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--hair);
  }
  .bar .glass {
    width: 19px; height: 19px;
    flex: none;
    color: var(--faint);
  }
  .bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1.05rem;
    letter-spacing: -.01em;
    padding: 0;
  }
  .bar input::placeholder { color: var(--faint); }
  .scope {
    display: inline-flex;
    align-items: center;
    gap: .45rem;
    padding: .26rem .55rem .26rem .5rem;
    border: 1px solid var(--hair-2);
    border-radius: 8px;
    background: var(--panel-2);
    font-size: .74rem;
    color: var(--dim);
    white-space: nowrap;
  }
  .scope .swatch {
    width: 12px; height: 12px; border-radius: 4px;
    background: linear-gradient(135deg, var(--coral), #b94a8c);
  }

  /* ---------- Results ---------- */
  .results {
    overflow-y: auto;
    padding: .4rem .5rem .6rem;
    scrollbar-width: thin;
    scrollbar-color: var(--raised) transparent;
  }
  .results::-webkit-scrollbar { width: 10px; }
  .results::-webkit-scrollbar-thumb {
    background: var(--raised); border-radius: 8px;
    border: 3px solid var(--panel);
  }

  .section-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: .9rem .75rem .35rem;
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .section-label .count { font-family: var(--mono); letter-spacing: .04em; }

  .row {
    display: grid;
    grid-template-columns: 30px 1fr auto;
    align-items: center;
    gap: .85rem;
    padding: .58rem .75rem;
    border-radius: 9px;
    cursor: default;
    position: relative;
    scroll-margin: 3rem;
  }
  .row.is-active {
    background: var(--sel);
    box-shadow: inset 0 0 0 1px var(--hair);
  }
  .row.is-active::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 56%;
    border-radius: 3px;
    background: var(--coral);
  }

  /* leading icon / monogram */
  .ico {
    width: 30px; height: 30px;
    display: grid; place-items: center;
    border-radius: 8px;
    font-size: .82rem;
    font-weight: 600;
    color: color-mix(in oklab, var(--ac, #cfcfd6) 75%, var(--text));
    background: color-mix(in oklab, var(--ac, #6a6a70) 16%, var(--panel-2));
    border: 1px solid color-mix(in oklab, var(--ac, #6a6a70) 28%, var(--hair-2));
  }
  .ico svg { width: 16px; height: 16px; }

  .body { min-width: 0; }
  .title {
    font-size: .95rem;
    letter-spacing: -.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .title b { font-weight: 600; }
  .sub {
    margin-top: .12rem;
    font-size: .8rem;
    color: var(--dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sub .mono { font-family: var(--mono); font-size: .76rem; color: var(--faint); }

  .accessory {
    display: flex;
    align-items: center;
    gap: .6rem;
    color: var(--dim);
    font-size: .8rem;
    white-space: nowrap;
  }
  .state {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .76rem; color: var(--dim);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--faint);
    box-shadow: 0 0 0 3px transparent;
  }
  .state[data-s="ok"]   .dot { background: var(--ok);   box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 16%, transparent); }
  .state[data-s="busy"] .dot { background: var(--busy); box-shadow: 0 0 0 3px color-mix(in oklab, var(--busy) 18%, transparent); }
  .state[data-s="ok"]   { color: color-mix(in oklab, var(--ok) 55%, var(--dim)); }
  .state[data-s="busy"] { color: color-mix(in oklab, var(--busy) 60%, var(--dim)); }

  .value { font-family: var(--mono); font-size: .82rem; color: var(--text); }

  kbd {
    font-family: var(--sans);
    font-size: .7rem;
    color: var(--dim);
    background: var(--raised);
    border: 1px solid var(--hair-2);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: .12rem .4rem;
    min-width: 1.3em;
    display: inline-grid;
    place-items: center;
  }
  .row:not(.is-active) .accessory kbd { opacity: 0; }

  .empty {
    padding: 2.5rem 1rem;
    text-align: center;
    color: var(--faint);
    font-size: .9rem;
  }

  /* ---------- Footer action bar ---------- */
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: .7rem 1rem;
    border-top: 1px solid var(--hair);
    background: var(--panel-2);
  }
  .brand {
    display: flex; align-items: center; gap: .6rem;
    font-size: .82rem; color: var(--dim);
  }
  .brand .mark {
    width: 18px; height: 18px; border-radius: 6px;
    background: linear-gradient(135deg, var(--coral), #a8438a);
    box-shadow: 0 0 0 1px rgba(0,0,0,.3) inset;
    display: grid; place-items: center;
    font-size: .62rem; font-weight: 800; color: #1a1a1d;
  }
  .brand b { color: var(--text); font-weight: 600; }
  .actions { display: flex; align-items: center; gap: 1.1rem; }
  .action { display: inline-flex; align-items: center; gap: .4rem; font-size: .8rem; color: var(--dim); }

  @media (max-width: 480px) {
    .sub { white-space: normal; }
    .accessory .state span { display: none; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .row { transition: background .12s ease; }
  }
</style>
</head>
<body>
  <main class="palette" role="application" aria-label="Agent Arcade command center">
    <div class="bar">
      <svg class="glass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="text" placeholder="Search the arcade — agents, jobs, system…" autocomplete="off" spellcheck="false" autofocus />
      <span class="scope"><span class="swatch"></span><span id="scope-label">Local snapshot</span></span>
    </div>

    <div class="results" id="results"></div>

    <div class="foot">
      <div class="brand"><span class="mark">AA</span><span><b>Agent Arcade</b> · read-only</span></div>
      <div class="actions">
        <span class="action">Open <kbd>↵</kbd></span>
        <span class="action">Navigate <kbd>↑</kbd><kbd>↓</kbd></span>
        <span class="action">Actions <kbd>⌘K</kbd></span>
      </div>
    </div>
  </main>

<script>
/* ---- embedded snapshot (mirrors data/latest.json) ---------------- */
const FALLBACK = {
  meta: { title:"Agent Arcade", subtitle:"Local-first dashboard for Hermes operators", location:"local", generated_at:"2026-06-21T15:01:44-04:00" },
  hermes: {
    version:{version:"0.17.0", build:"2026.6.19", upstream:"296b290f"},
    gateway:{running:true, pid:76095, other_profiles:[{name:"grok",pid:1035}]},
    cron:{running:true, active_jobs:10, next_run:"18:00"}
  },
  repo:{branch:"main", head:"7ab318b", changed_files:8, staged_files:1, unstaged_files:3, untracked_files:4},
  agents:[
    {label:"Rogue", role:"Product control plane", cabinet:"command-deck", accent:"#ff6b5e", status:"ready", signal:"All systems stable."},
    {label:"Codex", role:"Primary builder", cabinet:"builder-bay", accent:"#5fa8ff", status:"ready", signal:"All systems stable."},
    {label:"Claude Code", role:"Deep reviewer", cabinet:"review-rail", accent:"#56d189", status:"ready", signal:"All systems stable."},
    {label:"Scout", role:"Repo ranger", cabinet:"branch-radar", accent:"#7c8cff", status:"active", signal:"8 files changed in this repo."},
    {label:"Sentinel", role:"Gateway watcher", cabinet:"pulse-tower", accent:"#f0c23f", status:"ready", signal:"All systems stable."},
    {label:"Ticker", role:"Scheduler monitor", cabinet:"clockwork", accent:"#ff8a6b", status:"ready", signal:"All systems stable."},
    {label:"Patchbay", role:"Local automation", cabinet:"wire-mesh", accent:"#67d3e6", status:"active", signal:"10 cron job definitions detected."},
    {label:"Archivist", role:"Snapshot keeper", cabinet:"memory-vault", accent:"#c08aff", status:"active", signal:"Writing replayable snapshots to data/runs/."}
  ],
  cron:[
    {name:"morning-operating-brief", schedule:"0 8 * * 1-5", next:"Mon 08:00", last:"ok"},
    {name:"weekly-rogue-fiction-draft", schedule:"0 20 * * 0", next:"Today 20:00", last:"ok"},
    {name:"rogue-watchdog-health-monitor", schedule:"0 */6 * * *", next:"Today 18:00", last:"ok"},
    {name:"family-weekend-weather-and-outing-brief", schedule:"30 8 * * 5", next:"Fri 08:30", last:"ok"},
    {name:"rogue-pregnancy-weekly", schedule:"0 19 * * 0", next:"Today 19:00", last:"ok"},
    {name:"rogue-knowledge-curated-sync", schedule:"20 21 * * *", next:"Today 21:20", last:"ok"},
    {name:"rogue-pr-babysitter-loop", schedule:"0 8-18 * * 1-5", next:"Mon 08:00", last:"ok"},
    {name:"rogue-personal-site-loop", schedule:"0 */6 * * *", next:"Today 18:00", last:"ok"},
    {name:"rogue-knowledge-hygiene-loop", schedule:"30 21 * * *", next:"Today 21:30", last:"ok"},
    {name:"rogue-disk-hygiene-watchdog", schedule:"0 */6 * * *", next:"Today 18:00", last:"ok"}
  ]
};

const stateOf = s => (s === "ready" ? "ok" : "busy");
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function buildRows(d){
  const rows = [];
  const h = d.hermes, r = d.repo;
  // System group
  rows.push({g:"System", icon:"svg:chip", title:`Hermes <b>v${h.version.version}</b>`, sub:`build ${h.version.build} · upstream ${h.version.upstream}`, state:"ok", value:"online", key:"hermes version build runtime"});
  rows.push({g:"System", icon:"svg:wave", title:`Gateway <b>online</b>`, sub:`pid ${h.gateway.pid}${h.gateway.other_profiles?.length?` · +${h.gateway.other_profiles.length} other profile`:""}`, state:"ok", value:"running", key:"gateway messaging heartbeat"});
  rows.push({g:"System", icon:"svg:clock", title:`Scheduler — <b>${h.cron.active_jobs} jobs</b>`, sub:`next run ${h.cron.next} · cron daemon active`, state:"ok", value:"active", key:"scheduler cron jobs next run"});
  rows.push({g:"System", icon:"svg:branch", title:`Worktree — <b>${r.changed_files} changed</b>`, sub:`branch ${r.branch} @ ${r.head} · ${r.staged_files} staged · ${r.untracked_files} untracked`, state:"busy", value:"dirty", key:"git repo worktree branch changes"});

  // Fleet group
  d.agents.forEach((a,i) => rows.push({
    g:"Fleet", ac:a.accent, mono:a.label.slice(0,1),
    title:`<b>${esc(a.label)}</b>`, sub:`${esc(a.role)} · ${esc(a.cabinet)}`,
    state: stateOf(a.status), value: a.status,
    signal: a.signal,
    key:`${a.label} ${a.role} ${a.cabinet} ${a.signal}`.toLowerCase()
  }));

  // Jobs group
  d.cron.forEach(c => rows.push({
    g:"Scheduled Jobs", icon:"svg:clock", mono:null,
    title:`<b>${esc(c.name)}</b>`, sub:`<span class="mono">${esc(c.schedule)}</span> · last run ${c.last}`,
    state: c.last === "ok" ? "ok" : "busy", value: c.next,
    key:`${c.name} ${c.schedule}`.toLowerCase()
  }));
  return rows;
}

const ICONS = {
  chip:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="7" y="7" width="10" height="10" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>',
  wave:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 12h3l2-6 4 14 3-9 2 4h6"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  branch:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="8" r="2.5"/><path d="M6 8.5v7M8.5 8C14 8 15.5 9 15.5 11v1"/></svg>'
};

const elResults = document.getElementById("results");
let ROWS = [], visible = [], active = 0;

function render(filter=""){
  const f = filter.trim().toLowerCase();
  visible = f ? ROWS.filter(r => r.key.includes(f)) : ROWS.slice();
  if (active >= visible.length) active = Math.max(0, visible.length - 1);

  if (!visible.length){
    elResults.innerHTML = `<div class="empty">No matches for “${esc(filter)}”. Try <b>gateway</b>, <b>scout</b>, or <b>cron</b>.</div>`;
    return;
  }

  let html = "", lastG = null;
  visible.forEach((r, idx) => {
    if (r.g !== lastG){
      const cnt = visible.filter(x => x.g === r.g).length;
      html += `<div class="section-label">${r.g}<span class="count">${cnt}</span></div>`;
      lastG = r.g;
    }
    const icoInner = r.icon?.startsWith("svg:")
      ? ICONS[r.icon.slice(4)]
      : esc(r.mono || "•");
    const acc = r.g === "Fleet"
      ? `<span class="state" data-s="${r.state}"><span class="dot"></span><span>${esc(r.value)}</span></span><kbd>↵</kbd>`
      : `<span class="value">${esc(r.value)}</span><span class="state" data-s="${r.state}"><span class="dot"></span></span>`;
    const sub = r.g === "Fleet" ? `${r.sub} — ${esc(r.signal)}` : r.sub;
    html += `
      <div class="row${idx===active?" is-active":""}" data-i="${idx}" style="${r.ac?`--ac:${r.ac}`:''}">
        <span class="ico">${icoInner}</span>
        <span class="body"><span class="title">${r.title}</span><span class="sub">${sub}</span></span>
        <span class="accessory">${acc}</span>
      </div>`;
  });
  elResults.innerHTML = html;
}

function move(delta){
  if (!visible.length) return;
  active = (active + delta + visible.length) % visible.length;
  render(document.getElementById("q").value);
  const el = elResults.querySelector(".row.is-active");
  if (el) el.scrollIntoView({block:"nearest"});
}

const q = document.getElementById("q");
q.addEventListener("input", () => { active = 0; render(q.value); });
document.addEventListener("keydown", e => {
  if (e.key === "ArrowDown"){ e.preventDefault(); move(1); }
  else if (e.key === "ArrowUp"){ e.preventDefault(); move(-1); }
  else if (e.key === "Escape"){ q.value=""; active=0; render(); q.focus(); }
});
elResults.addEventListener("mousemove", e => {
  const row = e.target.closest(".row");
  if (row){ const i = +row.dataset.i; if (i!==active){ active=i; render(q.value); } }
});

function boot(d){ ROWS = buildRows(d); render(); }
boot(FALLBACK);

// Optional live upgrade when served over http(s)
if (location.protocol.startsWith("http")) {
  fetch("../data/latest.json").then(r=>r.ok?r.json():null).then(j=>{
    if(!j) return;
    const d = {
      hermes:{ version:j.hermes.version, gateway:j.hermes.gateway,
        cron:{active_jobs:j.hermes.cron.active_jobs, next:(j.hermes.cron.next_run||"").slice(11,16)} },
      repo:j.repo,
      agents:j.agents.map(a=>({label:a.label, role:a.role, cabinet:a.cabinet, accent:FALLBACK.agents.find(x=>x.label===a.label)?.accent||"#9c9ca3", status:a.status, signal:a.signal})),
      cron:j.hermes.cron_list.entries.map(c=>({name:c.name, schedule:c.schedule, next:(c.next_run||"").slice(5,16).replace("T"," "), last:(c.last_run||"").trim().endsWith("ok")?"ok":"—"}))
    };
    document.getElementById("scope-label").textContent = "Live · " + j.generated_at.slice(11,16);
    boot(d);
  }).catch(()=>{});
}
</script>
</body>
</html>
