<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Arcade - Cabinet Register</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="cabinet" aria-labelledby="arcade-title">
      <header class="cabinet-head">
        <div class="cabinet-title">
          <p class="eyebrow" id="model">AA-8 local cabinet</p>
          <h1 id="arcade-title">Agent Arcade</h1>
          <p class="subtitle" id="subtitle">Local-first dashboard for Hermes operators</p>
        </div>
        <div class="cabinet-source" id="source-badge">
          <span class="source-light" aria-hidden="true"></span>
          <span class="source-label" id="source-label">Snapshot</span>
          <strong id="source-text">Generated</strong>
        </div>
      </header>

      <section class="readout" id="readout" aria-label="System readout" aria-live="polite"></section>

      <section class="fleet-panel" aria-labelledby="fleet-title">
        <div class="section-head">
          <h2 id="fleet-title">Fleet Register</h2>
          <span id="fleet-count">8 agents</span>
        </div>
        <div class="fleet-register" id="fleet" aria-live="polite"></div>
      </section>

      <section class="routines-panel" aria-labelledby="routines-title">
        <div class="section-head">
          <h2 id="routines-title">Scheduled Routines</h2>
          <span id="routine-count">0 routines</span>
        </div>
        <div class="routines" id="routines"></div>
      </section>

      <section class="story-panel is-hidden" id="story-panel" aria-labelledby="story-title">
        <div class="section-head">
          <h2 id="story-title">Cartridge Story</h2>
          <span id="story-count">0 cartridges</span>
        </div>
        <div class="story" id="story"></div>
      </section>

      <footer class="cabinet-foot">
        <span class="stamp" id="stamp">read-only · no sends · no config writes</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
