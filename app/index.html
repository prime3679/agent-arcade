<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Arcade — AA-8 Console</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="device">
      <span class="screw tl"></span><span class="screw tr"></span>
      <span class="screw bl"></span><span class="screw br"></span>

      <header class="head">
        <div class="wordmark">
          <h1 id="arcade-title">Agent Arcade</h1>
          <span class="model" id="model">AA-8 · LOCAL</span>
        </div>
        <div class="head-right">
          <div class="palette-chips" aria-hidden="true">
            <i style="background:#ff5a1f"></i><i style="background:#1faf5a"></i>
            <i style="background:#2f6dff"></i><i style="background:#ffc21f"></i>
            <i style="background:#15140f"></i>
          </div>
          <span class="rec" id="source-badge">
            <span class="led" aria-hidden="true"></span>
            <span id="source-text">Live</span>
          </span>
        </div>
      </header>

      <section class="lcd" id="lcd" aria-label="System readout" aria-live="polite"></section>

      <div class="strip-label" id="mixer-label">Fleet · 8 channels</div>
      <section class="mixer" id="mixer" aria-label="Agent fleet" aria-live="polite"></section>

      <div class="strip-label">Patch bay · scheduled routines</div>
      <section class="patch" id="patch" aria-label="Scheduled routines"></section>

      <div class="strip-label summon-label is-hidden" id="summon-label">Cartridge bay · summon mode</div>
      <section class="summon is-hidden" id="summon" aria-label="Summoned cartridges"></section>

      <footer class="transport">
        <div class="keys" aria-hidden="true">
          <button>◀</button><button>▶</button>
          <button class="accent">●</button><button>■</button>
        </div>
        <span class="stamp" id="stamp">read-only · no sends · no config writes</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
